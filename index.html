
<!DOCTYPE html>
<html lang="zh-CN">
<head>

<link href="bdm.ico" mce_href="bdm.ico" rel="icon" type="image/x-icon" /> 
<link href="bdm.ico" mce_href="bdm.ico" rel="shortcut icon" type="image/x-icon" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aorustudio|maoxiong life</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f0f2f5;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        header h1 {
            color: #2c3e50;
            font-size: clamp(28px, 3.5vw, 42px);
            margin-bottom: 8px;
        }

        header p {
            color: #666;
            font-size: clamp(14px, 1.2vw, 16px);
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .image-card {
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            height: clamp(200px, 28vw, 320px);
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .image-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
        }

        .image-card:hover img {
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .modal-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #333;
            font-size: 36px;
            cursor: pointer;
            background-color: rgba(255,255,255,0.8);
            border-radius: 50%;
            padding: 8px 12px;
            transition: all 0.3s ease;
        }

        .close:hover {
            background-color: #ff4444;
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: #ecf0f1;
            font-size: clamp(12px, 0.8vw, 14px);
            border-top: 1px solid #34495e;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>moxiong life (Ⅰ)</h1>
            <p>AI STORY</p>
        </header>

        <div class="image-grid">
            <div class="image-card">
                <img src="1.jpg" width="2048" height="2048" alt="MAOXIONG STORY">
            </div>
            <div class="image-card">
              <img src="2.jpg" width="2048" height="2048" alt="MAOXIONG STORY">
            </div>
            <div class="image-card">
              <img src="3.jpg" width="2048" height="2048" alt="MAOXIONG STORY">
            </div>
            <div class="image-card">
              <img src="4.jpg" width="2048" height="2048" alt="MAOXIONG STORY">
            </div>
          <div class="image-card">
              <img src="5.jpg" width="2048" height="2048" alt="MAOXIONG STORY">
            </div>
            <div class="image-card">
              <img src="8.jpg" width="2048" height="2048" alt="MAOXIONG STORY">
            </div>
            <div class="image-card">
              <img src="9.jpg" width="2048" height="2048" alt="MAOXIONG STORY">
            </div>
            <div class="image-card">
              <img src="10.jpg" width="2048" height="2048" alt="MAOXIONG STORY">
            </div>
        </div>

        <div id="myModal" class="modal">
            <div class="modal-content">
                <img id="modalImg" src="" alt="放大预览">
            </div>
            <span class="close">&times;</span>
        </div>
    </div>

    <footer>
        <p>© 2026 AORU. 保留所有权利.</p>
    </footer>

    <script>
        // 图片点击放大预览
        const imageCards = document.querySelectorAll('.image-card');
        const modal = document.getElementById('myModal');
        const modalImg = document.getElementById('modalImg');
        const closeBtn = document.querySelector('.close');

        imageCards.forEach(card => {
            card.addEventListener('click', () => {
                modalImg.src = card.querySelector('img').src;
                modal.style.display = 'flex';
            });
        });

        // 关闭模态框
        closeBtn.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        // 点击模态框外部关闭
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = 'none';
            }
        });

        // 按Esc键关闭模态框
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modal.style.display === 'flex') {
                modal.style.display = 'none';
            }
        });

        // 窗口大小变化时调整图片高度
        window.addEventListener('resize', () => {
            document.querySelectorAll('.image-card').forEach(card => {
                card.style.height = `clamp(200px, 28vw, 320px)`;
            });
        });
    </script>
</body>
</html>
